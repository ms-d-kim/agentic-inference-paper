<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Figure 1 — The agentic-serving ecosystem and the unoccupied measurement niche</title>
<style>
  :root{
    --bg:#f7f6f3; --surface:#ffffff; --panel:#fbfaf7; --text:#1b1b18; --text2:#5f5f58; --text3:#94948c;
    --border:rgba(0,0,0,.18); --hair:rgba(0,0,0,.10); --serif:Georgia,"Times New Roman","Latin Modern Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#1a1a18; --surface:#242422; --panel:#201f1d; --text:#ececea; --text2:#a6a69f; --text3:#71716a;
      --border:rgba(255,255,255,.22); --hair:rgba(255,255,255,.12); }
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .wrap{height:100%;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:10px;padding:12px 18px 6px;flex-wrap:wrap}
  h1{font-family:var(--serif);font-size:15px;font-weight:400;font-style:italic;margin:0 14px 0 0;color:var(--text2)}
  #chips{display:flex;gap:5px;flex-wrap:wrap}
  .chip{font-family:var(--sans);font-size:11px;padding:3px 9px;border-radius:3px;border:1px solid var(--cc);color:var(--text);background:transparent;cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s}
  .chip .cd{width:9px;height:9px;border-radius:2px;background:var(--cc)}
  .chip.off{opacity:.34}
  .tools{margin-left:auto;display:flex;gap:5px}
  .tb{width:32px;height:32px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .tb:active{transform:scale(.94)}
  #vp{position:relative;flex:1;min-height:420px;overflow:hidden;cursor:grab;touch-action:none;border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);background:var(--bg)}
  #vp.grab{cursor:grabbing}
  #world{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
  #edges{position:absolute;left:0;top:0;overflow:visible;pointer-events:none}
  .hdr{font-family:var(--serif);font-size:12.5px;font-style:italic;fill:var(--text3)}
  .elbl{font-family:var(--serif);font-style:italic;font-size:12px;fill:var(--text2);paint-order:stroke;stroke:var(--bg);stroke-width:4px;stroke-linejoin:round}
  .seamlbl{fill:#c0562a}
  .np{position:absolute;transform:translate(-50%,-50%);z-index:2}
  .node{width:178px;background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--nc);border-radius:4px;padding:7px 10px 8px;cursor:pointer;transition:transform .2s cubic-bezier(.22,1,.36,1),background .15s,opacity .2s}
  .node:hover{transform:scale(1.035);background:var(--panel)}
  .node .tag{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--nc);font-weight:500}
  .node .ttl{font-size:13px;font-weight:500;margin:1px 0 2px;line-height:1.2}
  .node .sub{font-size:11px;color:var(--text2);line-height:1.32}
  .node.big{width:206px;border-width:1px;border-top-width:4px;box-shadow:0 0 0 1px var(--nc) inset}
  .node.sel{box-shadow:0 0 0 2px var(--nc)}
  .dim{opacity:.16 !important}
  #tip{position:absolute;left:0;top:0;max-width:250px;padding:9px 12px;border-radius:4px;background:var(--surface);border:1px solid var(--border);box-shadow:0 6px 22px rgba(0,0,0,.16);opacity:0;transform:translateY(4px);transition:opacity .15s,transform .18s;pointer-events:none;z-index:20;font-size:12.5px;line-height:1.5}
  #tip .tt{font-weight:500;display:block;margin-bottom:2px}
  #tip .td{color:var(--text2)}
  figcaption{padding:9px 18px 6px;font-family:var(--serif);font-size:12.5px;line-height:1.5;color:var(--text2)}
  figcaption b{font-style:normal;font-weight:400;color:var(--text)}
  .key{padding:0 18px 12px;display:flex;flex-wrap:wrap;gap:14px;font-family:var(--serif);font-size:11.5px;color:var(--text2);align-items:center}
  .key .k{display:inline-flex;align-items:center;gap:6px}
  .key .ks{width:16px;height:0;border-top-width:2px;border-top-style:solid;display:inline-block}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
</style>
</head>
<body>
<figure class="wrap" style="margin:0">
<header>
  <h1>Figure 1 &mdash; the agentic-serving ecosystem</h1>
  <div id="chips"></div>
  <div class="tools">
    <button class="tb" id="zin" aria-label="Zoom in">+</button>
    <button class="tb" id="zout" aria-label="Zoom out">&minus;</button>
    <button class="tb" id="zfit" aria-label="Reset view">&#10530;</button>
  </div>
</header>
<p class="sr">Tiered dataflow diagram of the agentic LLM serving ecosystem. Left to right: personas and their pains; chat and agent clients with orchestrators; open serving engines (vLLM, SGLang) with KV infrastructure and crowded agent-aware mechanisms; the orchestrator-to-engine seam where realized cache reuse falls below available reuse; vendor hardware (NVIDIA Dynamo); a measurement band (Cost-of-Pass, AA-AgentPerf, InferenceX, task benchmarks); and this work — an open cost-per-verified-task meter — with its three contributions. Drag to pan, scroll to zoom, hover for detail, click a node to focus its relationships.</p>
<div id="vp"><div id="world"><svg id="edges" width="1200" height="800"></svg></div><div id="tip" role="status"></div></div>
<figcaption><b>Figure 1.</b> The agentic-serving ecosystem as a left-to-right dataflow. Agent and chat clients submit through workflow-agnostic orchestrators to open serving engines; at the <span style="color:#c0562a">orchestrator&#8596;engine seam</span> the engine is blind to the agent loop, so under mixed-traffic interleaving an agent's <i>realized</i> KV-cache reuse falls below its <i>available</i> reuse. A crowded field of mechanisms and vendor hints attacks this; benchmarks measure capability or energy but not cost-per-completed-task tied to cache behavior on open infra. <b>This work</b> instruments that gap (locality gap = available &minus; realized) and ships the meter and the missing public trace.</figcaption>
<div class="key" id="key"></div>
</figure>
<script>
(function(){
  var cats={
    persona:{c:'#9a4b52',l:'Persona / pain',tag:'PERSONA'},
    chat:{c:'#8a6d3b',l:'Co-tenant traffic',tag:'CO-TENANT'},
    app:{c:'#3f5b86',l:'Agent app',tag:'AGENT APP'},
    orch:{c:'#5a6aa8',l:'Orchestration',tag:'ORCHESTRATION'},
    infra:{c:'#3f8f7c',l:'KV infra',tag:'KV INFRA'},
    engine:{c:'#2f7d6a',l:'Serving engine',tag:'SERVING ENGINE'},
    mech:{c:'#9c7a2e',l:'Mechanism (crowded)',tag:'MECHANISM'},
    vendor:{c:'#6b5d4f',l:'Vendor / hardware',tag:'VENDOR'},
    meas:{c:'#6a5a92',l:'Measurement',tag:'BENCHMARK'},
    oppty:{c:'#2b5a86',l:'Contribution',tag:'CONTRIBUTION'},
    project:{c:'#1f3a5f',l:'This work',tag:'THIS WORK'}
  };
  var N=[
    {id:'U1',cat:'persona',x:70,y:130,t:'Platform / serving eng',s:'pain: can’t explain agents ≈5× chat',det:'Owns the GPUs; cache misses spike when chat and agents share an engine. Needs to attribute cost.'},
    {id:'U2',cat:'persona',x:70,y:280,t:'Agent product builder',s:'pain: $/token hides $/task',det:'Ships an agent product; long-horizon loops blow the budget while per-token price looks fine.'},
    {id:'U3',cat:'persona',x:70,y:450,t:'ML-systems researcher',s:'pain: no public agentic+cost trace',det:'Can’t compare engines/configs fairly without a shared mixed, cost-labeled workload.'},
    {id:'U4',cat:'persona',x:70,y:600,t:'Eng leadership / FinOps',s:'pain: unpredictable bills',det:'Needs a cost-per-successful-task meter to forecast and govern agent spend.'},
    {id:'CT',cat:'chat',x:300,y:80,t:'Chat / RAG traffic',s:'the co-tenant in mixed serving',det:'Short, bursty requests sharing the engine; their arrivals evict agent KV — the interleaving driver (H1).'},
    {id:'A1',cat:'app',x:300,y:215,t:'Coding agents',s:'Cursor · Claude Code · Codex · OpenHands',det:'Long tool-loops; context grows monotonically — the canonical high-reuse agent workload.'},
    {id:'A2',cat:'app',x:300,y:345,t:'Web / computer-use agents',s:'browser & GUI control loops',det:'Multi-step perception-action loops; similar reuse profile, different tool latencies.'},
    {id:'O',cat:'orch',x:300,y:480,t:'Orchestrators',s:'LangGraph · CrewAI · Agents SDK',det:'Drive the ReAct loop. Workflow-agnostic to the engine — the contract that is missing is here.'},
    {id:'KV',cat:'infra',x:590,y:110,t:'KV infra',s:'Mooncake · LMCache · llm-d',det:'Distributed KV pools / offload that extend the cache beyond one GPU’s HBM.'},
    {id:'E1',cat:'engine',x:590,y:270,t:'vLLM',s:'PagedAttention + prefix caching',det:'Open engine #1. Exposes prefix_cache_hits/queries + per-request num_cached_tokens — our realized-reuse source.'},
    {id:'E2',cat:'engine',x:590,y:410,t:'SGLang',s:'RadixAttention reuse (ceiling)',det:'Open engine #2. Content-based prefix sharing — the best-case reuse ceiling to measure against.'},
    {id:'M',cat:'mech',x:590,y:575,t:'Agent-aware mechanisms',s:'KVFlow · Continuum · SAGA · ThunderAgent · Helium · Cortex · HexAGenT',det:'The crowded fix: everyone is building agent-aware caching/scheduling. That is why we measure rather than add one.'},
    {id:'V1',cat:'vendor',x:860,y:300,t:'NVIDIA Dynamo',s:'KV-aware router + agent hints',det:'The declared contract, shipping: nvext.agent_hints + cache_control TTL. Pre-empts “propose a hint spec”.'},
    {id:'B3',cat:'meas',x:250,y:700,t:'SWE-bench V · τ²-bench · HAL',s:'our task benchmarks; HAL cost-aware',det:'Define “verified task”. SWE-bench Verified + τ²-bench are the two pilot arms.'},
    {id:'C0',cat:'meas',x:470,y:700,t:'Cost-of-Pass (anchor)',s:'$ per correct solution',det:'The academic anchor: expected cost per correct answer. We open it up to serving-internal cache behavior.'},
    {id:'B1',cat:'meas',x:690,y:700,t:'AA-AgentPerf',s:'agents/MW under SLO; closed set',det:'Industry agent-efficiency benchmark — agents-per-megawatt, closed test set, no cost-per-task.'},
    {id:'B2',cat:'meas',x:900,y:700,t:'InferenceX',s:'$/token, throughput; not agentic',det:'General serving benchmark; cost-per-token and throughput, not tied to agent task success.'},
    {id:'Z1',cat:'oppty',x:1075,y:150,t:'Cost-of-Grit meter (C1)',s:'the locality-tax curve',det:'Lead contribution: cost per completed task vs horizon × cache policy × tenancy — the missing meter.'},
    {id:'Z2',cat:'oppty',x:1075,y:310,t:'Public mixed trace (C3)',s:'cost-labeled · open-infra · none exists',det:'Artifact contribution: a mixed chat+agent, cost-labeled, OTel-format serving trace + harness.'},
    {id:'P',cat:'project',x:1040,y:470,t:'This work — the open meter',s:'cost-per-verified-task · gap = available − realized',det:'Holds the model fixed; varies serving knobs on open infra; measures the value lost at the seam.',big:1},
    {id:'Z3',cat:'oppty',x:1075,y:630,t:'Value-of-hints (C4)',s:'declared vs inferred — measured',det:'Re-scoped contribution: measure the marginal value of existing hints (Dynamo pre-empts proposing a new spec).'}
  ];
  var E=[
    ['CT','E1','interleave','interleaves → evicts agent KV'],['CT','E2','interleave'],
    ['A1','O','flow'],['A2','O','flow'],
    ['O','E1','seam','workflow-agnostic seam'],['O','E2','seam'],
    ['KV','E1','flow'],['KV','E2','flow'],
    ['M','E1','flow'],['M','E2','flow'],
    ['E1','V1','flow'],['E2','V1','flow'],
    ['U1','E1','pain'],['U2','A1','pain'],['U3','B3','pain'],['U4','V1','pain'],
    ['B1','V1','meas'],['B2','E1','meas'],['B3','A1','meas'],
    ['C0','P','anchor','anchored on Cost-of-Pass'],
    ['P','E1','project','measures available − realized'],['P','V1','project'],
    ['P','Z1','deliver'],['P','Z2','deliver'],['P','Z3','deliver'],
    ['Z3','V1','preempt','pre-empted by Dynamo']
  ];
  var ek={
    flow:{c:'#9aa3af',w:1.4,d:'',l:'request / data flow'},
    seam:{c:'#c0562a',w:2.6,d:'',l:'orchestrator↔engine seam'},
    interleave:{c:'#c0562a',w:1.8,d:'6 4',l:'mixed-traffic interleaving'},
    meas:{c:'#6a5a92',w:1.4,d:'2 5',l:'measures'},
    pain:{c:'#9a4b52',w:1.3,d:'2 5',l:'persona pain'},
    project:{c:'#1f3a5f',w:1.9,d:'',l:'this work instruments'},
    deliver:{c:'#2b5a86',w:1.8,d:'',l:'delivers'},
    anchor:{c:'#9c7a2e',w:1.5,d:'6 5',l:'anchors / pre-empts'},
    preempt:{c:'#9c7a2e',w:1.5,d:'6 5'}
  };
  var byId={};N.forEach(function(n){byId[n.id]=n;});
  var world=document.getElementById('world'),svg=document.getElementById('edges'),vp=document.getElementById('vp'),tip=document.getElementById('tip');
  var NS='http://www.w3.org/2000/svg';
  var heads=[[70,'personas / pains'],[300,'clients · agents · orchestration'],[590,'open serving engines'],[860,'vendor / hardware'],[1075,'this work & contributions']];
  heads.forEach(function(h){var t=document.createElementNS(NS,'text');t.setAttribute('x',h[0]);t.setAttribute('y',34);t.setAttribute('text-anchor','middle');t.setAttribute('class','hdr');t.textContent=h[1];svg.appendChild(t);});
  var mb=document.createElementNS(NS,'text');mb.setAttribute('x',250);mb.setAttribute('y',655);mb.setAttribute('class','hdr');mb.textContent='measurement & benchmarks';svg.appendChild(mb);
  var edgeEls=[];
  E.forEach(function(e){
    var a=byId[e[0]],b=byId[e[1]],s=ek[e[2]];
    var ln=document.createElementNS(NS,'line');
    ln.setAttribute('x1',a.x);ln.setAttribute('y1',a.y);ln.setAttribute('x2',b.x);ln.setAttribute('y2',b.y);
    ln.setAttribute('stroke',s.c);ln.setAttribute('stroke-width',s.w);ln.setAttribute('stroke-opacity','0.55');ln.setAttribute('stroke-linecap','round');
    if(s.d)ln.setAttribute('stroke-dasharray',s.d);
    ln._s=e[0];ln._t=e[1];ln._w=s.w;svg.appendChild(ln);edgeEls.push(ln);
    if(e[3]){var t=document.createElementNS(NS,'text');var mx=(a.x+b.x)/2,my=(a.y+b.y)/2;t.setAttribute('x',mx);t.setAttribute('y',my-3);t.setAttribute('text-anchor','middle');t.setAttribute('class','elbl'+(e[2]==='seam'||e[2]==='interleave'?' seamlbl':''));t.textContent=e[3];svg.appendChild(t);}
  });
  var nodeEls={};
  N.forEach(function(n){
    var pos=document.createElement('div');pos.className='np';pos.style.left=n.x+'px';pos.style.top=n.y+'px';
    var el=document.createElement('div');el.className='node'+(n.big?' big':'');el.style.setProperty('--nc',cats[n.cat].c);
    el.innerHTML='<span class="tag">'+cats[n.cat].tag+'</span><div class="ttl">'+n.t+'</div><div class="sub">'+n.s+'</div>';
    el.tabIndex=0;el.setAttribute('role','button');el.setAttribute('aria-label',n.t);
    pos.appendChild(el);world.appendChild(pos);nodeEls[n.id]=el;n._pos=pos;
    el.addEventListener('mouseenter',function(){showTip(n);});
    el.addEventListener('mouseleave',function(){if(!sel)hideTip();});
    el.addEventListener('click',function(ev){ev.stopPropagation();select(sel===n.id?null:n.id);});
  });
  var st={x:0,y:0,s:0.62},raf=0;
  function apply(){world.style.transform='translate('+st.x+'px,'+st.y+'px) scale('+st.s+')';if(sel)placeTipFor(byId[sel]);}
  function sched(){if(!raf)raf=requestAnimationFrame(function(){raf=0;apply();});}
  function fit(){var r=vp.getBoundingClientRect();st.s=Math.max(.3,Math.min(1.25,(r.width-40)/1200,(r.height-28)/800));st.x=(r.width-1200*st.s)/2;st.y=(r.height-800*st.s)/2;sched();}
  function showTip(n){tip.innerHTML='<span class="tt">'+n.t+'</span><span class="td">'+(n.det||n.s)+'</span>';tip.style.opacity='1';tip.style.transform='translateY(0)';placeTipFor(n);}
  function placeTipFor(n){var r=vp.getBoundingClientRect(),sxp=st.x+n.x*st.s,syp=st.y+n.y*st.s,tw=tip.offsetWidth||220,th=tip.offsetHeight||70;var L=Math.max(8,Math.min(sxp-tw/2,r.width-tw-8)),T=syp-th-30;if(T<8)T=syp+30;tip.style.left=L+'px';tip.style.top=T+'px';}
  function hideTip(){tip.style.opacity='0';tip.style.transform='translateY(4px)';}
  var sel=null;
  function nb(id){var s={};s[id]=1;E.forEach(function(e){if(e[0]===id)s[e[1]]=1;if(e[1]===id)s[e[0]]=1;});return s;}
  function select(id){
    sel=id;
    if(!id){N.forEach(function(n){nodeEls[n.id].classList.remove('sel','dim');});edgeEls.forEach(function(l){l.classList.remove('dim');l.setAttribute('stroke-opacity','0.55');l.setAttribute('stroke-width',l._w);});hideTip();return;}
    var s=nb(id);
    N.forEach(function(n){var el=nodeEls[n.id];el.classList.toggle('sel',n.id===id);el.classList.toggle('dim',!s[n.id]);});
    edgeEls.forEach(function(l){var on=(l._s===id||l._t===id);l.classList.toggle('dim',!on);l.setAttribute('stroke-opacity',on?'1':'0.1');l.setAttribute('stroke-width',on?(l._w+0.8):l._w);});
    showTip(byId[id]);
  }
  var drag=null;
  vp.addEventListener('pointerdown',function(e){if(e.target.closest('.node'))return;drag={x:e.clientX,y:e.clientY};vp.classList.add('grab');vp.setPointerCapture(e.pointerId);if(sel)select(null);});
  vp.addEventListener('pointermove',function(e){if(!drag)return;st.x+=e.clientX-drag.x;st.y+=e.clientY-drag.y;drag.x=e.clientX;drag.y=e.clientY;sched();});
  vp.addEventListener('pointerup',function(){drag=null;vp.classList.remove('grab');});
  vp.addEventListener('pointercancel',function(){drag=null;vp.classList.remove('grab');});
  vp.addEventListener('wheel',function(e){e.preventDefault();var r=vp.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,wx=(mx-st.x)/st.s,wy=(my-st.y)/st.s,ns=Math.max(.35,Math.min(2.6,st.s*(e.deltaY<0?1.12:0.89)));st.x=mx-wx*ns;st.y=my-wy*ns;st.s=ns;sched();},{passive:false});
  function zc(f){var r=vp.getBoundingClientRect(),mx=r.width/2,my=r.height/2,wx=(mx-st.x)/st.s,wy=(my-st.y)/st.s,ns=Math.max(.35,Math.min(2.6,st.s*f));st.x=mx-wx*ns;st.y=my-wy*ns;st.s=ns;sched();}
  document.getElementById('zin').onclick=function(){zc(1.2);};
  document.getElementById('zout').onclick=function(){zc(0.83);};
  document.getElementById('zfit').onclick=function(){select(null);fit();};
  var chips=document.getElementById('chips'),hidden={};
  Object.keys(cats).forEach(function(k){
    var b=document.createElement('button');b.className='chip';b.style.setProperty('--cc',cats[k].c);
    b.innerHTML='<span class="cd"></span>'+cats[k].l;
    b.onclick=function(){hidden[k]=!hidden[k];b.classList.toggle('off',hidden[k]);
      N.forEach(function(n){if(n.cat===k)n._pos.style.display=hidden[k]?'none':'';});
      edgeEls.forEach(function(l){l.style.display=(hidden[byId[l._s].cat]||hidden[byId[l._t].cat])?'none':'';});
    };
    chips.appendChild(b);
  });
  var key=document.getElementById('key');
  [['seam','#c0562a'],['interleave','#c0562a'],['flow','#9aa3af'],['project','#1f3a5f'],['deliver','#2b5a86'],['meas','#6a5a92'],['pain','#9a4b52'],['anchor','#9c7a2e']].forEach(function(kk){
    var e=ek[kk[0]],sp=document.createElement('span');sp.className='k';
    sp.innerHTML='<span class="ks" style="border-top-color:'+kk[1]+';border-top-style:'+(e.d?'dashed':'solid')+';border-top-width:'+(e.w>2?3:2)+'px"></span>'+e.l;
    key.appendChild(sp);
  });
  window.addEventListener('resize',function(){if(!sel)fit();});
  fit();
})();
</script>
</body>
</html>
